app = "mr-burguer-api"
primary_region = "dfw"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT     = "3000"
  HOST     = "0.0.0.0"
  NODE_ENV = "production"

[[services]]
  protocol    = "tcp"
  internal_port = 3000
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port     = 80
    handlers = ["http"]

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type       = "requests"
    hard_limit = 50
    soft_limit = 25

  [[services.http_checks]]
    interval = 30000
    timeout  = 5000
    path     = "/health"

[vm]
  size = "shared-cpu-1x"
  memory = "256mb"
